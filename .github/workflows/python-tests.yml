name: Python tests

on:
  push:
    branches: [main]
    paths:
      - "python/**"
      - "tests/python/**"
      - "tests/data/**"
      - 'tests/reference/**'
      - "benchmarks/**"
      - ".github/workflows/python-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "python/**"
      - "tests/python/**"
      - "tests/data/**"
      - 'tests/reference/**'
      - "benchmarks/**"
      - ".github/workflows/python-tests.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: python/pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install PME-toolkit Python package
        run: pip install -e ./python

      - name: Install test dependencies
        run: pip install pytest

      - name: Show Python environment
        run: |
          python --version
          pip --version
          pip list

      - name: Run pytest
        run: pytest -q
